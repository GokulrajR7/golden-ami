name: jenkins-al2023-component

description: Install Jenkins on Amazon Linux 2023

schemaVersion: 1.0

phases:

  - name: build
    steps:

      - name: DownloadInstallScript
        action: ExecuteBash
        inputs:
          commands:
            - aws s3 cp s3://golden-ami-scripts-gokul/install.sh /tmp/install.sh --region ap-south-1
            - chmod +x /tmp/install.sh
            - /tmp/install.sh

  - name: validate
    steps:

      - name: VerifyInstallations
        action: ExecuteBash
        inputs:
          commands:
            - java -version
            - docker --version
            - git --version
