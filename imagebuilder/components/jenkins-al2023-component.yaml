name: jenkins-al2023-component
description: Install Jenkins on Amazon Linux 2023
schemaVersion: 1.0

phases:

  - name: build
    steps:

      - name: DownloadInstallScript
        action: ExecuteBash
        inputs:
          commands:
            - aws s3 cp s3://golden-ami-scripts-gokul/install.sh /tmp/install.sh
            - chmod +x /tmp/install.sh

      - name: RunInstallScript
        action: ExecuteBash
        inputs:
          commands:
            - /tmp/install.sh

  - name: validate
    steps:

      - name: VerifyTools
        action: ExecuteBash
        inputs:
          commands:
            - java -version
            - docker --version
            - git --version
